openapi: 3.0.3
info:
  title: ETL No-Code API
  version: 1.0.0
  description: |-
    REST API для визуального ETL-инструмента с NO-CODE-подходом.

    ## Авторизация
    Все эндпоинты (кроме `/auth/token/login/`) требуют заголовок:
    ```
    Authorization: Token <ваш_токен>
    ```

    ## Основной сценарий
    1. **Загрузить источник** — `POST /datasources/upload/`
    2. **Создать пайплайн** — `POST /pipelines/`
    3. **Добавить узлы** — `POST /pipelines/{id}/nodes/`
    4. **Связать узлы рёбрами** — `POST /pipelines/{id}/edges/`
    5. **Локальный preview узла** — `POST /pipelines/{pipeline_pk}/nodes/{id}/preview-run/`
    6. **Полный запуск** — `POST /pipelines/{id}/run/`
    7. **Отслеживать статус** — `GET /pipeline-runs/{id}/`
    8. **Посмотреть результат** — `GET /node-runs/{id}/preview/`
paths:
  /api/v1/auth/token/login/:
    post:
      operationId: v1_auth_token_login_create
      description: Use this endpoint to obtain user authentication token.
      tags:
      - Пользователи
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCreate'
          description: ''
  /api/v1/auth/token/logout/:
    post:
      operationId: v1_auth_token_logout_create
      description: Use this endpoint to logout user (remove user authentication token).
      tags:
      - Пользователи
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/datasources/:
    get:
      operationId: v1_datasources_list
      description: 'Возвращает постраничный список всех источников данных текущего
        пользователя. Каждый элемент содержит краткую информацию: тип, статус обработки,
        число строк/столбцов.'
      summary: Список источников данных
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Источники данных
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDataSourceListList'
          description: ''
  /api/v1/datasources/{id}/:
    get:
      operationId: v1_datasources_retrieve
      description: Возвращает полную информацию об источнике, включая метаданные столбцов
        (`columns_meta`) и размер файла.
      summary: Детали источника данных
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Источник данных.
        required: true
      tags:
      - Источники данных
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceDetail'
          description: ''
    delete:
      operationId: v1_datasources_destroy
      description: Удаляет источник данных и связанные файлы (оригинал + Parquet).
        Действие необратимо.
      summary: Удаление источника данных
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Источник данных.
        required: true
      tags:
      - Источники данных
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/datasources/{id}/preview/:
    get:
      operationId: v1_datasources_preview_retrieve
      description: Возвращает первые N строк готового источника. Доступен только для
        источников в статусе `ready`.
      summary: Предпросмотр данных источника
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Источник данных.
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Максимальное число строк в предпросмотре (по умолчанию settings.NUMBER_OF_PREVIEW_LINES).
      tags:
      - Источники данных
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
          description: ''
  /api/v1/datasources/connect-db/:
    post:
      operationId: v1_datasources_connect_db_create
      description: Создаёт источник данных типа `database`. Данные загружаются из
        указанной таблицы через SQLAlchemy и конвертируются в Parquet (асинхронно
        через Celery).
      summary: Подключение к внешней БД
      tags:
      - Источники данных
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataSourceDBRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DataSourceDBRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataSourceDBRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceDetail'
          description: ''
  /api/v1/datasources/upload/:
    post:
      operationId: v1_datasources_upload_create
      description: |-
        Загружает файл формата CSV или XLSX и ставит его в очередь на обработку (Celery). После обработки источник переходит в статус `ready`, а данные конвертируются в Parquet.

        **Ограничения:** макс. размер файла — 100 МБ (MAX_FILE_SIZE), макс. число строк — 5 000 (DATASOURCE_MAX_ROWS).
      summary: Загрузка файла (CSV / XLSX)
      tags:
      - Источники данных
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataSourceUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DataSourceUploadRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceDetail'
          description: ''
  /api/v1/node-runs/{id}/preview/:
    get:
      operationId: v1_node_runs_preview_retrieve
      description: Возвращает первые N строк выходного Parquet-файла для успешно выполненного
        узла (NodeRun в статусе `success`).
      summary: Предпросмотр результата узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Максимальное число строк в предпросмотре (по умолчанию settings.NUMBER_OF_PREVIEW_LINES).
      tags:
      - Запуски пайплайнов
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
          description: ''
  /api/v1/operations/:
    get:
      operationId: v1_operations_retrieve
      description: Возвращает каталог всех операций, сгруппированных по категориям.
        Каждая операция содержит `type`, `label`, `description`, `category`, информацию
        о входных портах и `config_schema` (JSON Schema draft-07 для автоматической
        генерации формы конфигурации).
      summary: Каталог доступных операций
      tags:
      - Операции
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationCatalog'
          description: ''
  /api/v1/pipeline-runs/{id}/:
    get:
      operationId: v1_pipeline_runs_retrieve
      description: Возвращает полную информацию о запуске, включая список NodeRun
        — результат выполнения каждого узла.
      summary: Детали запуска пайплайна
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Запуски пайплайнов
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRunDetail'
          description: ''
  /api/v1/pipelines/:
    get:
      operationId: v1_pipelines_list
      description: Возвращает постраничный список пайплайнов текущего пользователя.
        Каждый элемент содержит аннотированные поля `node_count` и `last_run_status`.
      summary: Список пайплайнов
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Пайплайны
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelineListList'
          description: ''
    post:
      operationId: v1_pipelines_create
      description: Создаёт пустой пайплайн. Узлы и рёбра добавляются отдельно.
      summary: Создание пайплайна
      tags:
      - Пайплайны
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineCreateUpdate'
          description: ''
  /api/v1/pipelines/{pipeline_pk}/edges/:
    get:
      operationId: v1_pipelines_edges_list
      description: Возвращает все рёбра (связи между узлами) указанного пайплайна.
      summary: Список рёбер пайплайна
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Рёбра пайплайна
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdgeList'
          description: ''
    post:
      operationId: v1_pipelines_edges_create
      description: Создаёт направленное ребро между двумя узлами одного пайплайна.
        Для операции JOIN используйте порты `left` / `right` в `target_port`.
      summary: Создание ребра
      parameters:
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Рёбра пайплайна
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EdgeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EdgeRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Edge'
          description: ''
  /api/v1/pipelines/{pipeline_pk}/edges/{id}/:
    delete:
      operationId: v1_pipelines_edges_destroy
      description: Удаляет связь между узлами.
      summary: Удаление ребра
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Рёбра пайплайна
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/pipelines/{pipeline_pk}/nodes/:
    get:
      operationId: v1_pipelines_nodes_list
      description: Возвращает все узлы указанного пайплайна.
      summary: Список узлов пайплайна
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Узлы пайплайна
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNodeList'
          description: ''
    post:
      operationId: v1_pipelines_nodes_create
      description: Добавляет новый узел в пайплайн. Поле `operation_type` определяет
        тип операции, `config` — JSON-объект с параметрами операции (см. `GET /operations/`
        для списка доступных типов).
      summary: Создание узла
      parameters:
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NodeRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
          description: ''
  /api/v1/pipelines/{pipeline_pk}/nodes/{id}/:
    get:
      operationId: v1_pipelines_nodes_retrieve
      description: 'Возвращает информацию об узле: тип, конфигурацию, позицию на холсте.'
      summary: Детали узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
          description: ''
    put:
      operationId: v1_pipelines_nodes_update
      description: Полное обновление параметров узла.
      summary: Обновление узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NodeRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
          description: ''
    patch:
      operationId: v1_pipelines_nodes_partial_update
      description: Частичное обновление (PATCH) — например, изменение только `config`
        или `position_x`/`position_y`.
      summary: Частичное обновление узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNodeRequest'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
          description: ''
    delete:
      operationId: v1_pipelines_nodes_destroy
      description: Удаляет узел и все связанные с ним рёбра.
      summary: Удаление узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/pipelines/{pipeline_pk}/nodes/{id}/input-columns/:
    get:
      operationId: v1_pipelines_nodes_input_columns_retrieve
      description: Возвращает список столбцов, доступных на входе узла. Для источников
        (`source_file`, `source_db`) — столбцы DataSource. Для остальных — столбцы
        из выходов предыдущих узлов (по входящим рёбрам). Используется фронтендом
        для автодополнения в полях конфигурации (фильтры, сортировка и т.д.).
      summary: Доступные столбцы входных данных узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputColumns'
          description: ''
  /api/v1/pipelines/{pipeline_pk}/nodes/{id}/preview-run/:
    post:
      operationId: v1_pipelines_nodes_preview_run_create
      description: Создаёт новый PipelineRun в режиме preview и запускает выполнение
        только подграфа `ancestors + target` для указанного узла. Downstream-узлы
        не исполняются.
      summary: Запуск preview для узла
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: pipeline_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Узлы пайплайна
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRunList'
          description: ''
  /api/v1/pipelines/{id}/:
    get:
      operationId: v1_pipelines_retrieve
      description: Возвращает полную структуру пайплайна, включая вложенные узлы (`nodes`)
        и рёбра (`edges`).
      summary: Детали пайплайна
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Пайплайн.
        required: true
      tags:
      - Пайплайны
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDetail'
          description: ''
    put:
      operationId: v1_pipelines_update
      description: Полное обновление названия и описания пайплайна.
      summary: Обновление пайплайна
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Пайплайн.
        required: true
      tags:
      - Пайплайны
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PipelineCreateUpdateRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineCreateUpdate'
          description: ''
    patch:
      operationId: v1_pipelines_partial_update
      description: Частичное обновление (PATCH) — можно передать только изменённые
        поля.
      summary: Частичное обновление пайплайна
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Пайплайн.
        required: true
      tags:
      - Пайплайны
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPipelineCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
