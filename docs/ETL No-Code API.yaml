tags:
- name: Пользователи
  description: Пользователи, регистрация, получение и удаление токена (djoser).
- name: Источники данных
  description: Загрузка файлов (CSV/XLSX), подключение к внешним БД. Файлы автоматически
    конвертируются в Parquet.
- name: Пайплайны
  description: CRUD пайплайнов — визуальных графов обработки данных. Пайплайн содержит
    узлы и рёбра.
- name: Узлы пайплайна
  description: 'Узлы — операции обработки данных внутри пайплайна. URL: `/pipelines/{pipeline_pk}/nodes/`.'
- name: Рёбра пайплайна
  description: 'Рёбра — направленные связи между узлами. URL: `/pipelines/{pipeline_pk}/edges/`.'
- name: Запуски пайплайнов
  description: Запуск пайплайна, отслеживание статуса, предпросмотр результатов отдельных
    узлов.
- name: Операции
  description: Справочник доступных операций для построения пайплайна. Используйте
    значение `type` при создании узлов.
